name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version for manual CI validation (e.g. 1.2.3-ci or v1.2.3-ci)
        required: true
        type: string

env:
  NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build-windows:
    strategy:
      matrix:
        include:
          - runner: windows-latest
            arch: x64
            nuitka_output: build/win-x64
            inno_arch: x64
            artifact: ELG-app-win-x64
            checksum: checksums-win-x64.txt
          - runner: windows-11-arm
            arch: arm64
            nuitka_output: build/win-arm64
            inno_arch: arm64
            artifact: ELG-app-win-arm64
            checksum: checksums-win-arm64.txt
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ${{ env.NUITKA_CACHE_DIR }}
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-${{ runner.arch }}-
      - uses: ./.github/actions/set-release-version
        with:
          ref-name: ${{ env.RELEASE_REF }}
      - uses: ./.github/actions/write-runtime-secrets
        with:
          mongodb_uri: ${{ secrets.MONGODB_URI }}
          gh_models_token: ${{ secrets.GH_MODELS_TOKEN }}
          gae_url: ${{ secrets.GAE_URL }}
          notifications_secret: ${{ secrets.NOTIFICATIONS_SECRET }}
      - run: pip install -r requirements.txt nuitka
      - run: >
          python -m nuitka --output-dir=${{ matrix.nuitka_output }} --msvc=latest
          --product-version=${{ env.NUITKA_VERSION }}
          --include-data-files=src/runtime_secrets.py=runtime_secrets.py
          --include-data-files=src/_version.py=_version.py
          src/main.py
      - name: Compile Inno Setup installer
        run: iscc /DMyAppVersion=${{ env.APP_VERSION }} /DMyAppArch=${{ matrix.inno_arch }} installer\windows\ELG-app.iss
      - name: Generate checksums
        shell: bash
        run: |
          cd dist-installers
          sha256sum *.exe > ${{ matrix.checksum }}
          cat ${{ matrix.checksum }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist-installers/*.exe
            dist-installers/${{ matrix.checksum }}

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ${{ env.NUITKA_CACHE_DIR }}
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-${{ runner.arch }}-
      - uses: ./.github/actions/set-release-version
        with:
          ref-name: ${{ env.RELEASE_REF }}
      - uses: ./.github/actions/write-runtime-secrets
        with:
          mongodb_uri: ${{ secrets.MONGODB_URI }}
          gh_models_token: ${{ secrets.GH_MODELS_TOKEN }}
          gae_url: ${{ secrets.GAE_URL }}
          notifications_secret: ${{ secrets.NOTIFICATIONS_SECRET }}
      - run: pip install -r requirements.txt nuitka
      - run: >
          python -m nuitka --output-dir=build/macos-arm64 --macos-target-arch=arm64
          --product-version=${{ env.NUITKA_VERSION }}
          --include-data-files=src/runtime_secrets.py=runtime_secrets.py
          --include-data-files=src/_version.py=_version.py
          src/main.py
      - run: mv "build/macos-arm64/main.app" "build/macos-arm64/ELG.app"
      - run: codesign --force --deep --sign - "build/macos-arm64/ELG.app"
      - run: brew install create-dmg
      - run: bash scripts/build_elg_dmg.sh "build/macos-arm64/ELG.app"
      - name: Generate checksums
        run: |
          cd dist-installers
          shasum -a 256 *.dmg > checksums-macos-arm64.txt
          cat checksums-macos-arm64.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ELG-app-macos-arm64
          path: |
            dist-installers/*.dmg
            dist-installers/checksums-macos-arm64.txt

  build-linux-x64:
    runs-on: ubuntu-latest
    container: python:3.12-bullseye
    steps:
      - uses: actions/checkout@v4
      - run: apt-get update && apt-get install -y build-essential patchelf ccache tk-dev
      - uses: actions/cache@v4
        with:
          path: ${{ env.NUITKA_CACHE_DIR }}
          key: nuitka-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-${{ runner.arch }}-
      - uses: ./.github/actions/set-release-version
        with:
          ref-name: ${{ env.RELEASE_REF }}
      - uses: ./.github/actions/write-runtime-secrets
        with:
          mongodb_uri: ${{ secrets.MONGODB_URI }}
          gh_models_token: ${{ secrets.GH_MODELS_TOKEN }}
          gae_url: ${{ secrets.GAE_URL }}
          notifications_secret: ${{ secrets.NOTIFICATIONS_SECRET }}
      - run: pip install -r requirements.txt nuitka
      - run: >
          python -m nuitka --output-dir=build/linux-x64
          --product-version=${{ env.NUITKA_VERSION }}
          --include-data-files=src/runtime_secrets.py=runtime_secrets.py
          --include-data-files=src/_version.py=_version.py
          --include-data-files=scripts/linux_apply_update.sh=linux_apply_update.sh
          src/main.py
      - run: |
          mkdir -p dist-installers
          tar -C build/linux-x64/main.dist -czf \
            "dist-installers/ELG.tar.gz" .
      - name: Generate checksums
        run: |
          cd dist-installers
          sha256sum *.tar.gz > checksums-linux-x64.txt
          cat checksums-linux-x64.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ELG-app-linux-x64
          path: |
            dist-installers/*.tar.gz
            dist-installers/checksums-linux-x64.txt

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos-arm64, build-linux-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
